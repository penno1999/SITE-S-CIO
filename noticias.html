<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Notícias</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📰 Notícias</h2>
  <div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function load(){
  const snap = await db.collection("noticias").orderBy("data","desc").get();

  snap.forEach(doc=>{
    const n = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${n.titulo}</h3>
        <p>${n.texto}</p>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
