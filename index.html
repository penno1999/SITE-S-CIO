<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal da Baixada</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Poppins;
  color: #fff;
  background: radial-gradient(circle at top, #111, #000);
}

/* HEADER */
header {
  background: rgba(0,0,0,0.8);
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a {
  color: #ccc;
  margin-left: 15px;
  text-decoration: none;
}

nav a:hover {
  color: #fff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 34px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.hero p {
  color: #aaa;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

button {
  background: #fff;
  color: #000;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div><b>🏟 2° CANIL BAIXADA</b></div>

  <nav>
    <a href="index.html">Início</a>
    <a href="noticias.html">Notícias</a>
    <a href="eventos.html">Eventos</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h1>PORTAL DA BAIXADA</h1>
  <p>História, união e paixão pelo clube</p>
</div>

<!-- CARDS -->
<div class="grid">

  <div class="card">
    <h3>📰 Notícias</h3>
    <p>Acompanhe tudo que acontece na torcida.</p>
    <button onclick="location.href='noticias.html'">Acessar</button>
  </div>

  <div class="card">
    <h3>📅 Eventos</h3>
    <p>Viagens e encontros oficiais.</p>
    <button onclick="location.href='eventos.html'">Ver</button>
  </div>

  <div class="card">
    <h3>👤 Sócio</h3>
    <p>Acesse sua carteirinha digital.</p>
    <button onclick="location.href='socio.html'">Entrar</button>
  </div>

</div>

</body>
</html>
