<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Sócio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Poppins;
    background: #0b0b0b;
    color: white;
    text-align: center;
}

header {
    padding: 25px;
    background: #151515;
    font-weight: 800;
}

.container {
    margin-top: 40px;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-weight: bold;
}

.card {
    margin: 30px auto;
    max-width: 350px;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #333;
}

.status {
    margin-top: 10px;
    font-weight: bold;
}

.ativo { color: limegreen; }
.inativo { color: red; }
</style>
</head>

<body>

<header>
    CONSULTA DE SÓCIO
</header>

<div class="container">

<input id="busca" placeholder="Digite o nome ou ID">
<button onclick="buscar()">Consultar</button>

<div id="resultado"></div>

</div>

<script src="data.js"></script>

<script>
function buscar() {
    let valor = document.getElementById("busca").value.toLowerCase();
    let res = document.getElementById("resultado");

    let socio = socios.find(s => s.nome.toLowerCase().includes(valor));

    if (!socio) {
        res.innerHTML = "<p>❌ Sócio não encontrado</p>";
        return;
    }

    res.innerHTML = `
    <div class="card">
        <h3>${socio.nome}</h3>
        <div class="status ${socio.status}">
            ${socio.status.toUpperCase()}
        </div>
    </div>
    `;
}
</script>

</body>
</html>
