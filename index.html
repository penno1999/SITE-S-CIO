<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal da Baixada</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET BÁSICO (evita tela preta bugada) */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Poppins, sans-serif;
  color: #ffffff;
  background: #0b0b0b;
  min-height: 100vh;
}

/* HEADER */
header {
  background: rgba(0,0,0,0.9);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

header b {
  font-size: 16px;
  letter-spacing: 1px;
}

nav a {
  color: #cfcfcf;
  margin-left: 15px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}

nav a:hover {
  color: #ffffff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 36px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.hero p {
  color: #b5b5b5;
  font-size: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 15px;
  padding: 20px;
  max-width: 1100px;
  margin: auto;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 18px;
  border-radius: 14px;
  backdrop-filter: blur(8px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border: 1px solid rgba(255,255,255,0.25);
}

.card h3 {
  margin-bottom: 8px;
}

.card p {
  color: #cfcfcf;
  font-size: 14px;
}

/* BOTÕES */
button {
  margin-top: 10px;
  background: #ffffff;
  color: #000000;
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #e6e6e6;
}

</style>

</head>

<body>

<!-- HEADER -->
<header>
  <div><b>🏟 2° CANIL BAIXADA</b></div>

  <nav>
    <a href="index.html">Início</a>
    <a href="noticias.html">Notícias</a>
    <a href="eventos.html">Eventos</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h1>PORTAL DA BAIXADA</h1>
  <p>História, união e paixão pelo clube</p>
</div>

<!-- CARDS -->
<div class="grid">

  <div class="card">
    <h3>📰 Notícias</h3>
    <p>Acompanhe tudo que acontece na torcida.</p>
    <button onclick="location.href='noticias.html'">Acessar</button>
  </div>

  <div class="card">
    <h3>📅 Eventos</h3>
    <p>Viagens e encontros oficiais.</p>
    <button onclick="location.href='eventos.html'">Ver</button>
  </div>

  <div class="card">
    <h3>👤 Sócio</h3>
    <p>Acesse sua carteirinha digital.</p>
    <button onclick="location.href='socio.html'">Entrar</button>
  </div>

</div>

</body>
</html>
