<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sócio</title>

<style>
body{
  background:#0b0f14;
  color:white;
  font-family:Arial;
  text-align:center;
}
.card{
  margin-top:80px;
  background:#111827;
  padding:20px;
  border-radius:12px;
  display:inline-block;
}
.ativo{color:lime;}
.inativo{color:red;}
</style>
</head>

<body>

<div class="card" id="info">Carregando...</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const id=new URLSearchParams(location.search).get("id");

async function load(){
  const doc=await db.collection("socios").doc(id).get();

  if(!doc.exists){
    info.innerHTML="Não encontrado";
    return;
  }

  const s=doc.data();

  info.innerHTML=`
    <h2>${s.nome}</h2>
    <h3 class="${s.status}">${s.status.toUpperCase()}</h3>
  `;
}

load();
</script>

</body>
</html>
