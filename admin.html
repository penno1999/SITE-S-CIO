<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin - Sócios</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Poppins;
    background: #0b0f14;
    color: white;
}

header {
    background: #111827;
    padding: 18px;
    font-weight: 700;
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* FORM */
.form {
    display: grid;
    grid-template-columns: 1fr 150px 120px;
    gap: 10px;
    margin-bottom: 20px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1f2937;
    color: white;
}

button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    padding: 10px;
}

.add {
    background: #22c55e;
    color: black;
}

/* CARDS */
.card {
    background: #111827;
    border: 1px solid #1f2937;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
}

.status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 5px;
}

.ativo {
    background: #16a34a;
}

.inativo {
    background: #dc2626;
}

/* BOTÕES */
.actions button {
    margin-right: 5px;
    padding: 6px 10px;
    font-size: 12px;
}

.edit { background: #f59e0b; }
.del { background: #ef4444; color: white; }

/* QR */
.qr {
    margin-top: 10px;
    background: white;
    padding: 5px;
    border-radius: 8px;
    width: fit-content;
}
</style>
</head>

<body>

<header>📊 Painel Admin - Sistema de Sócios</header>

<div class="container">

<!-- FORM -->
<div class="form">
    <input id="nome" placeholder="Nome do sócio">
    
    <select id="status">
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
    </select>

    <button class="add" onclick="addSocio()">Adicionar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

</div>

<!-- FIREBASE (COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 CONFIG FIREBASE (SEU PROJETO)
const firebaseConfig = {
  apiKey: "AIzaSyA8C54l6VG9PBugdhLOrMlA3bG3Cl2zd8Y",
  authDomain: "email-senha-s.firebaseapp.com",
  projectId: "email-senha-s",
  storageBucket: "email-s.firebaseapp.com",
  messagingSenderId: "869892914784",
  appId: "1:869892914784:web:75b37a7e877ed7b0d94d05"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ➕ ADICIONAR SÓCIO
async function addSocio(){
    const nome = document.getElementById("nome").value;
    const status = document.getElementById("status").value;

    if(!nome) return alert("Digite um nome");

    const id = Date.now().toString();

    await db.collection("socios").doc(id).set({
        nome,
        status,
        id
    });

    document.getElementById("nome").value = "";

    loadSocios();
}

// 📥 LISTAR
async function loadSocios(){
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const snap = await db.collection("socios").get();

    snap.forEach(doc => {
        const s = doc.data();

        const link = `${window.location.origin}/socio.html?id=${s.id}`;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${s.nome}</b><br>
            <span class="status ${s.status}">${s.status.toUpperCase()}</span><br>

            <button class="edit" onclick="toggle('${s.id}','${s.status}')">Alterar</button>
            <button class="del" onclick="del('${s.id}')">Excluir</button>

            <div class="qr" id="qr-${s.id}"></div>
        `;

        lista.appendChild(div);

        // QR CODE
        const qrContainer = document.getElementById(`qr-${s.id}`);

        QRCode.toCanvas(document.createElement("canvas"), link, function (err, canvas) {
            qrContainer.appendChild(canvas);
        });
    });
}

// 🔁 TOGGLE STATUS
async function toggle(id, status){
    await db.collection("socios").doc(id).update({
        status: status === "ativo" ? "inativo" : "ativo"
    });

    loadSocios();
}

// ❌ DELETE
async function del(id){
    await db.collection("socios").doc(id).delete();
    loadSocios();
}

// INIT
loadSocios();
</script>

</body>
</html>
