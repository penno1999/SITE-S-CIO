<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Poppins;
    background: #0d0d0d;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: #151515;
    font-weight: 800;
}

.container {
    max-width: 900px;
    margin: 20px auto;
    padding: 20px;
}

form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: white;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #1a1a1a;
    margin-top: 10px;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}

.status {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 6px;
}

.ativo { background: green; }
.inativo { background: red; }

.actions button {
    margin-left: 5px;
}
</style>
</head>

<body>

<header>
PAINEL ADMIN
</header>

<div class="container">

<form id="form">
    <input id="nome" placeholder="Nome do sócio">
    <select id="status">
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
    </select>
    <button>Adicionar</button>
</form>

<div id="lista"></div>

</div>

<script src="data.js"></script>

<script>
const form = document.getElementById("form");
const lista = document.getElementById("lista");

function render() {
    lista.innerHTML = "";

    socios.forEach((s, i) => {
        lista.innerHTML += `
        <div class="card">
            <div>
                <strong>${s.nome}</strong><br>
                <span class="status ${s.status}">${s.status}</span>
            </div>

            <div class="actions">
                <button onclick="toggle(${i})">Alterar</button>
                <button onclick="del(${i})">Excluir</button>
            </div>
        </div>
        `;
    });

    localStorage.setItem("socios", JSON.stringify(socios));
}

form.addEventListener("submit", e => {
    e.preventDefault();

    socios.push({
        nome: document.getElementById("nome").value,
        status: document.getElementById("status").value
    });

    form.reset();
    render();
});

function toggle(i) {
    socios[i].status = socios[i].status === "ativo" ? "inativo" : "ativo";
    render();
}

function del(i) {
    socios.splice(i, 1);
    render();
}

render();
</script>

</body>
</html>
